<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · 3J &amp; D Construction Services</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23F59E0B'/%3E%3Cg fill='none' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 18h14'/%3E%3Cpath d='M7 18V8l5-3v13'/%3E%3Cpath d='M17 18v-7l-5-3'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <script>
    (function () { try { var t = localStorage.getItem("tjd-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); document.documentElement.setAttribute("data-bs-theme", t); } catch (e) {} })();
  </script>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="text-center mb-4">
        <span class="brand-logo mx-auto mb-3" style="width:54px;height:54px;border-radius:15px">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18h14"/><path d="M7 18V8l5-3v13"/><path d="M17 18v-7l-5-3"/></svg>
        </span>
        <h1 class="h4 fw-bold mb-1">3J &amp; D Construction</h1>
        <p class="text-secondary small mb-0">Sign in to the project &amp; cost portal</p>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label small fw-semibold text-secondary" for="email">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input class="form-control" type="email" id="email" autocomplete="username" value="admin@3jdconstruction.com" required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold text-secondary" for="password">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input class="form-control" type="password" id="password" autocomplete="current-password" value="admin123" required />
              </div>
            </div>
            <div class="text-danger small fw-medium mb-3" id="loginErr" style="min-height:1em"></div>
            <button class="btn btn-primary w-100 py-2" type="submit" id="loginBtn">Sign in</button>
          </form>
        </div>
      </div>
      <p class="text-center text-secondary small mt-3 mb-0">Demo · admin@3jdconstruction.com / admin123</p>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById("loginForm");
      var err = document.getElementById("loginErr");
      var btn = document.getElementById("loginBtn");
      function nextUrl() {
        var p = new URLSearchParams(location.search).get("next");
        if (p && /^[A-Za-z0-9_.\-]+\.html(\?.*)?$/.test(p)) return p;
        return "index.html";
      }
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        err.textContent = "";
        btn.disabled = true; btn.textContent = "Signing in…";
        try {
          var res = await fetch("api/auth.php", {
            method: "POST", credentials: "same-origin",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ action: "login", email: document.getElementById("email").value.trim(), password: document.getElementById("password").value }),
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || "Sign in failed.");
          location.href = nextUrl();
        } catch (ex) {
          err.textContent = ex.message || "Sign in failed.";
          btn.disabled = false; btn.textContent = "Sign in";
        }
      });
    })();
  </script>
</body>
</html>
